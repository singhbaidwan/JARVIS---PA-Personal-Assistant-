spring:
  application:
    name: jarvis-core
  datasource:
    url: jdbc:sqlite:../jarvis-data/db/jarvis.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080

logging:
  level:
    root: INFO
    com.jarvis.core: INFO

jarvis:
  ai:
    base-url: http://127.0.0.1:8000
    predict-path: /predict
    anomaly-path: /anomaly
    search-path: /search
    assistant-chat-path: /assistant/chat
  behavior-learning:
    default-event-limit: 120
    min-confidence-to-enqueue: 0.6
    enqueue-source: jarvis-core-behavior-learning
  guardian:
    default-event-limit: 120
  search:
    base-dir: ../
    default-roots: ../
  assistant:
    default-event-limit: 20
