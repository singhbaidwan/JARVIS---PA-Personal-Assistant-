<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS Avatar Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="avatar-panel">
        <div class="halo"></div>
        <div class="avatar-shell" id="avatar-shell">
          <div class="avatar-face">
            <div class="eye left-eye"></div>
            <div class="eye right-eye"></div>
          </div>
        </div>
        <p class="status" id="status-text">Status: ready</p>
      </section>

      <section class="console-panel">
        <header>
          <h1>JARVIS</h1>
          <p>Avatar + LLM control interface</p>
        </header>

        <label class="api-row">
          <span>LLM API URL</span>
          <input id="api-url" type="text" value="http://127.0.0.1:8000/llm" />
        </label>

        <div class="chat-log" id="chat-log"></div>

        <form id="prompt-form" class="prompt-form">
          <textarea
            id="prompt-input"
            placeholder="Ask JARVIS to summarize your day, create a workflow, or suggest focus blocks."
            required
          ></textarea>
          <button id="send-button" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
